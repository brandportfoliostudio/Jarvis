<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at top, #0f0f0f, #070707);
      font-family: 'Orbitron', sans-serif;
      color: #00fff7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    h1 {
      color: #00fff7;
      text-shadow: 0 0 10px #00fff7, 0 0 20px #00fff7;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    #chatbox {
      width: 90%;
      max-width: 700px;
      height: 400px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid #00fff7;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 0 30px #00fff7;
    }

    .message {
      padding: 10px 15px;
      border-radius: 12px;
      max-width: 80%;
      animation: fadeIn 0.5s ease forwards;
    }

    .user {
      align-self: flex-end;
      background: #ff0055;
      color: #fff;
      box-shadow: 0 0 15px #ff0055;
    }

    .jarvis {
      align-self: flex-start;
      background: #00fff7;
      color: #000;
      box-shadow: 0 0 15px #00fff7;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(10px);}
      to {opacity: 1; transform: translateY(0);}
    }

    #controls {
      margin-top: 15px;
      display: flex;
      gap: 10px;
    }

    input {
      width: 60%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(0, 0, 0, 0.5);
      color: #00fff7;
      box-shadow: 0 0 10px #00fff7 inset;
      font-family: 'Orbitron', sans-serif;
    }

    button {
      padding: 12px 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(45deg, #00fff7, #0ff);
      color: #000;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px #00fff7;
      transition: all 0.3s ease;
    }

    button:hover {
      box-shadow: 0 0 30px #00fff7, 0 0 50px #00fff7;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>JARVIS AI</h1>
  <div id="chatbox"></div>
  <div id="controls">
    <input type="text" id="userInput" placeholder="Ask me anything...">
    <button onclick="sendMessage()">SEND</button>
    <button onclick="startListening()">🎤 SPEAK</button>
  </div>

  <script>
    const chatbox = document.getElementById('chatbox');
    const userInput = document.getElementById('userInput');

    function appendMessage(sender, message) {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      msg.textContent = message;
      chatbox.appendChild(msg);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function speak(text) {
      const synth = window.speechSynthesis;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.voice = synth.getVoices()[0];
      synth.speak(utterance);
    }

    function getJarvisResponse(message) {
      message = message.toLowerCase();
      if (message.includes("hi")) return "Mam,this is jarvis just wanna let u know Amey love's u the most and he wants u to become successful in ur life and achieving all ur dreams..if u wanna know more type 'more'";
      if (message.includes("time")) return `The current time is ${new Date().toLocaleTimeString()}.at this time world's most prettiest girl is looking at her phone and blushing 🤭`;
      if (message.includes("more")) return `U r really a great inspiration for amey ..u r the one who is his forever..fot him loving u forever sounds not enough coz his love has no end..now type 'time'`;
      return "I am still learning. Can you try asking something else, Sir?";
    }

    function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;
      appendMessage('user', message);
      const response = getJarvisResponse(message);
      appendMessage('jarvis', response);
      speak(response);
      userInput.value = '';
    }

    function startListening() {
      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = 'en-US';
      recognition.start();

      recognition.onresult = function(event) {
        const speechResult = event.results[0][0].transcript;
        userInput.value = speechResult;
        sendMessage();
      };

      recognition.onerror = function(event) {
        console.error("Speech recognition error:", event.error);
      };
    }

    userInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
